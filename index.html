<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>KG+ 近くの展示ファインダー</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="app">
    <section class="hero">
      <div class="kicker">KG+ Prototype</div>
      <h1>近くの展示ファインダー</h1>
      <p class="lead">現在地または手動地点から、近くのKG+展示を距離順で表示します。スマホでの利用を前提にした軽量な公開版です。</p>

      <div id="secureNotice" class="notice" style="display:none;"></div>

      <div class="toolbar">
        <div class="actions">
          <button id="locateBtn" class="primary">現在地を取得</button>
          <button id="demoBtn" class="ghost">デモ位置</button>
        </div>

        <div class="presets" id="presetButtons"></div>

        <div class="manualgrid">
          <input id="latInput" type="number" step="0.000001" placeholder="緯度 例: 35.011564">
          <input id="lngInput" type="number" step="0.000001" placeholder="経度 例: 135.768149">
          <button id="applyManualBtn" class="ghost">手動地点を使う</button>
        </div>

        <div class="chips" id="radiusChips"></div>

        <div class="searchwrap">
          <input id="searchInput" type="search" placeholder="番号 / 作家名 / 会場名で検索">
          <button id="clearSearch" class="ghost">クリア</button>
        </div>
      </div>

      <div id="status" class="status info">この版は公開環境向けです。GitHub Pages などにアップすると現在地取得が動作します。</div>
    </section>

    <section class="summary">
      <div class="stat">
        <div class="k">表示件数</div>
        <div id="countStat" class="v">-</div>
      </div>
      <div class="stat">
        <div class="k">最寄り展示</div>
        <div id="nearestStat" class="v">-</div>
      </div>
      <div class="stat">
        <div class="k">検索半径</div>
        <div id="radiusStat" class="v">500m</div>
      </div>
    </section>

    <div class="section-head">
      <h2>近くの展示</h2>
      <p id="subInfo">地点未設定</p>
    </div>

    <section id="list" class="list"></section>

    <footer>
      <p class="small">試作版です。展示データは data.json で差し替えできます。会期・営業時間・詳細URLの追加にも対応しやすい構成です。</p>
    </footer>
  </main>
  <script src="./app.js"></script>
</body>
</html>
